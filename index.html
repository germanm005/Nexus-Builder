<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Builder — Visual UI Editor</title>
    <link rel="stylesheet" href="css/main.css">
</head>

<body data-theme="dark">
    <div class="app">
        <!-- Header -->
        <header class="toolbar">
            <div class="toolbar__brand">
                <span class="logo">◈</span>
                <h1>Nexus Builder</h1>
            </div>

            <div class="toolbar__actions">
                <button id="btn-undo" class="btn btn--icon" title="Undo (Ctrl+Z)">↶</button>
                <button id="btn-redo" class="btn btn--icon" title="Redo (Ctrl+Y)">↷</button>
                <div class="divider"></div>

                <div class="breakpoint-switcher">
                    <button class="btn btn--toggle active" data-bp="desktop">🖥️</button>
                    <button class="btn btn--toggle" data-bp="tablet">📱</button>
                    <button class="btn btn--toggle" data-bp="mobile">📲</button>
                </div>

                <div class="divider"></div>
                <button id="btn-theme" class="btn btn--icon">🌓</button>
                <button id="btn-export" class="btn btn--primary">Export Code</button>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="workspace">
            <!-- Left: Components -->
            <aside class="panel panel--left">
                <h3 class="panel__title">Components</h3>
                <div class="component-lib">
                    <div class="component-item" data-type="button" draggable="true">
                        <span class="component-item__icon">🔘</span>
                        <span>Button</span>
                    </div>
                    <div class="component-item" data-type="card" draggable="true">
                        <span class="component-item__icon">🃏</span>
                        <span>Card</span>
                    </div>
                    <div class="component-item" data-type="input" draggable="true">
                        <span class="component-item__icon">⌨️</span>
                        <span>Input</span>
                    </div>
                    <div class="component-item" data-type="text" draggable="true">
                        <span class="component-item__icon">📝</span>
                        <span>Text</span>
                    </div>
                    <div class="component-item" data-type="image" draggable="true">
                        <span class="component-item__icon">🖼️</span>
                        <span>Image</span>
                    </div>
                </div>
            </aside>

            <!-- Center: Canvas -->
            <section class="canvas-wrapper">
                <div class="canvas-ruler canvas-ruler--top"></div>
                <div class="canvas-ruler canvas-ruler--left"></div>
                <div id="canvas" class="canvas" data-breakpoint="desktop">
                    <div class="canvas__grid"></div>
                    <div class="canvas__guides"></div>
                </div>
            </section>

            <!-- Right: Properties + Layers -->
            <aside class="panel panel--right">
                <div class="panel__tabs">
                    <button class="tab active" data-tab="properties">Properties</button>
                    <button class="tab" data-tab="layers">Layers</button>
                </div>

                <div class="tab-content active" id="tab-properties">
                    <div id="properties-panel" class="properties">
                        <p class="empty-state">Select an element to edit</p>
                    </div>
                </div>

                <div class="tab-content" id="tab-layers">
                    <div id="layers-panel" class="layers"></div>
                </div>
            </aside>
        </main>

        <!-- Bottom: Timeline -->
        <section class="timeline">
            <div class="timeline__header">
                <span class="timeline__title">Animation Timeline</span>
                <button id="btn-add-animation" class="btn btn--sm">+ Add Keyframe</button>
            </div>
            <div class="timeline__track" id="timeline-track"></div>
        </section>
    </div>

    <!-- Export Modal -->
    <div id="export-modal" class="modal">
        <div class="modal__content">
            <div class="modal__header">
                <h3>Generated Code</h3>
                <button class="btn btn--icon modal__close">✕</button>
            </div>
            <div class="modal__tabs">
                <button class="tab active" data-tab="html">HTML</button>
                <button class="tab" data-tab="css">SCSS</button>
            </div>
            <pre class="code-block" id="code-output"><code>Select an element or export all</code></pre>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>
